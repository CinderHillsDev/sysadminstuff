name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege: this workflow only reads the repo (checkout).
permissions:
  contents: read

jobs:
  smoke:
    name: Smoke tests (pure logic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install dependencies
        run: npm install
      - name: Run smoke tests
        run: node tests/smoke.mjs

  lint:
    name: Lint code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install dependencies
        run: npm install
      - name: Run linting
        run: npx eslint . --ext .js,.mjs --ignore-pattern node_modules/ --max-warnings=100

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install dependencies
        run: npm install
      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

  e2e:
    name: E2E (wrangler pages dev)
    runs-on: ubuntu-latest
    needs: [smoke, lint]
    # Hits live third-party APIs — flakiness upstream shouldn't fail the build.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install dependencies
        run: npm install
      - name: Start Pages dev server
        run: |
          npx --yes wrangler@3 pages dev . --port 8788 --ip 127.0.0.1 > wrangler.log 2>&1 &
          echo "WRANGLER_PID=$!" >> "$GITHUB_ENV"
      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8788/ >/dev/null 2>&1; then
              echo "server up after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "server did not start; log:"; cat wrangler.log; exit 1
      - name: Run e2e tests
        env:
          BASE_URL: http://127.0.0.1:8788
        run: node tests/e2e.mjs
      - name: Wrangler log (on failure)
        if: failure()
        run: cat wrangler.log
      - name: Kill wrangler process
        if: always()
        run: kill -9 $WRANGLER_PID || true
